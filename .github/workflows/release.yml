name: Release

on:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "CHANGELOG.md"
      - "README.md"
      - "deliverables/README.md"
      - "LICENSE"
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  RELEASE_RUST_VERSION: "1.96.1"
  RELEASE_RUST_COMMIT: "31fca3adb283cc9dfd56b49cdee9a96eb9c96ffd"

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.validate.outputs.version }}
      revision: ${{ steps.validate.outputs.revision }}
      publish: ${{ steps.validate.outputs.publish }}
    steps:
      - name: Checkout release revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate event, version, notes, and provenance
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          revision="$(git rev-parse HEAD)"
          test "$revision" = "$GITHUB_SHA"
          printf 'RELEASE_REVISION=%s\n' "$revision"

          metadata="$(cargo metadata --locked --no-deps --format-version 1)"
          version="$(jq -er --arg manifest "$GITHUB_WORKSPACE/Cargo.toml" \
            '[.packages[] | select(.manifest_path == $manifest) | .version] | if length == 1 then .[0] else error("root package must be unique") end' \
            <<<"$metadata")"
          [[ "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]

          mapfile -t lock_versions < <(awk '
            $0 == "[[package]]" { package_name = ""; next }
            $1 == "name" && $3 == "\"mysteries\"" { package_name = "mysteries"; next }
            package_name == "mysteries" && $1 == "version" {
              gsub(/\"/, "", $3); print $3; package_name = ""
            }
          ' Cargo.lock)
          test "${#lock_versions[@]}" -eq 1
          test "${lock_versions[0]}" = "$version"
          cargo tree --locked -p "mysteries@$version" --depth 0 >/dev/null

          test "$(grep -Ec '^## \[Unreleased\]$' CHANGELOG.md)" -eq 1
          heading_prefix="## [$version] - "
          mapfile -t release_headings < <(grep -F "$heading_prefix" CHANGELOG.md)
          test "${#release_headings[@]}" -eq 1
          release_heading="${release_headings[0]}"
          release_date="${release_heading#"$heading_prefix"}"
          [[ "$release_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
          test "$release_heading" = "$heading_prefix$release_date"
          awk -v heading="$release_heading" '
            $0 == heading { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          grep -q '[^[:space:]]' release-notes.md

          publish=false
          case "$GITHUB_EVENT_NAME" in
            pull_request)
              [[ "$GITHUB_REF" =~ ^refs/pull/[0-9]+/merge$ ]]
              ;;
            workflow_dispatch)
              ;;
            push)
              [[ "$GITHUB_REF" =~ ^refs/tags/(v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))$ ]]
              tag_name="${BASH_REMATCH[1]}"
              tag_version="${tag_name#v}"
              test "$tag_version" = "$version"

              git fetch --force --no-tags origin \
                refs/heads/master:refs/remotes/origin/master \
                "$GITHUB_REF:$GITHUB_REF"
              test "$(git cat-file -t "$GITHUB_REF")" = tag
              tag_object="$(git rev-parse "$GITHUB_REF")"
              peeled="$(git rev-parse "$GITHUB_REF^{}")"
              master="$(git rev-parse refs/remotes/origin/master)"
              test "$tag_object" != "$peeled"
              test "$peeled" = "$revision"
              test "$peeled" = "$GITHUB_SHA"
              git merge-base --is-ancestor "$revision" "$master"
              tagger_timestamp="$(git for-each-ref --format='%(taggerdate:iso8601-strict)' "$GITHUB_REF")"
              test -n "$tagger_timestamp"
              tagger_utc_date="$(date -u -d "$tagger_timestamp" +%F)"
              test "$tagger_utc_date" = "$release_date"
              publish=true
              ;;
            *)
              echo "unsupported release event: $GITHUB_EVENT_NAME" >&2
              exit 1
              ;;
          esac

          {
            printf 'version=%s\n' "$version"
            printf 'revision=%s\n' "$revision"
            printf 'publish=%s\n' "$publish"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes-${{ steps.validate.outputs.version }}
          path: release-notes.md
          if-no-files-found: error
          retention-days: 7

  package-windows:
    name: Package release (windows-x86_64)
    needs: metadata
    runs-on: windows-2022
    steps:
      - name: Checkout release revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify revision
        shell: pwsh
        env:
          EXPECTED_REVISION: ${{ needs.metadata.outputs.revision }}
        run: |
          $ErrorActionPreference = 'Stop'
          $Revision = (git rev-parse HEAD).Trim()
          if ($Revision -ne $env:EXPECTED_REVISION) { throw 'Windows checkout revision不一致' }
          "RELEASE_REVISION=$Revision"

      - name: Install and verify fixed Rust toolchain
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          rustup toolchain install $env:RELEASE_RUST_VERSION --profile minimal --target x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { throw 'rustup toolchain install失败' }
          $Info = (& rustc '+1.96.1' -Vv | Out-String)
          $Info
          if ($LASTEXITCODE -ne 0 -or $Info -notmatch "commit-hash: $env:RELEASE_RUST_COMMIT" -or $Info -notmatch 'host: x86_64-pc-windows-msvc') {
              throw 'Windows release toolchain事实不一致'
          }

      - name: Build, smoke, and package Windows archive
        id: package
        shell: pwsh
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          & cargo '+1.96.1' build --release --locked --target x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { throw 'Windows release build失败' }

          $Binary = Join-Path $env:GITHUB_WORKSPACE 'target\x86_64-pc-windows-msvc\release\mysteries.exe'
          if (-not (Test-Path -LiteralPath $Binary -PathType Leaf) -or (Get-Item -LiteralPath $Binary).Length -le 0) {
              throw 'Windows release binary缺失或为空'
          }
          $SmokeHome = Join-Path $env:RUNNER_TEMP 'mysteries-smoke-home-windows'
          New-Item -ItemType Directory -Path $SmokeHome | Out-Null
          $env:HOME = $SmokeHome
          $env:USERPROFILE = $SmokeHome
          $env:XDG_CONFIG_HOME = Join-Path $SmokeHome '.config'
          $VersionText = (& $Binary --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $VersionText -ne "mysteries $env:VERSION") { throw 'Windows --version异常' }
          & $Binary --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'Windows --help异常' }

          $Stage = Join-Path $env:RUNNER_TEMP 'mysteries-package-windows'
          New-Item -ItemType Directory -Path $Stage | Out-Null
          Copy-Item -LiteralPath $Binary -Destination (Join-Path $Stage 'mysteries.exe')
          Copy-Item -LiteralPath 'LICENSE','README.md' -Destination $Stage
          $Expected = @('LICENSE','README.md','mysteries.exe') | Sort-Object
          $Actual = @(Get-ChildItem -LiteralPath $Stage -File | Select-Object -ExpandProperty Name | Sort-Object)
          if (Compare-Object $Expected $Actual) { throw 'Windows staging文件集异常' }
          if (@(Get-ChildItem -LiteralPath $Stage -Recurse | Where-Object { $_.Attributes -band [IO.FileAttributes]::ReparsePoint }).Count -ne 0) {
              throw 'Windows staging包含reparse point'
          }

          $ArchiveName = "mysteries-v$env:VERSION-x86_64-pc-windows-msvc.zip"
          $Archive = Join-Path $env:RUNNER_TEMP $ArchiveName
          Compress-Archive -Path (Join-Path $Stage '*') -DestinationPath $Archive
          if ((Get-Item -LiteralPath $Archive).Length -le 0) { throw 'Windows archive为空' }

          $Expanded = Join-Path $env:RUNNER_TEMP 'mysteries-expanded-windows'
          Expand-Archive -LiteralPath $Archive -DestinationPath $Expanded
          $ExpandedFiles = @(Get-ChildItem -LiteralPath $Expanded -File | Select-Object -ExpandProperty Name | Sort-Object)
          if (Compare-Object $Expected $ExpandedFiles) { throw 'Windows archive文件集异常' }
          $ExpandedBinary = Join-Path $Expanded 'mysteries.exe'
          $ExpandedVersion = (& $ExpandedBinary --version | Out-String).Trim()
          if ($LASTEXITCODE -ne 0 -or $ExpandedVersion -ne "mysteries $env:VERSION") { throw '展开后的Windows --version异常' }
          & $ExpandedBinary --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw '展开后的Windows --help异常' }
          "archive=$Archive" >> $env:GITHUB_OUTPUT

      - name: Upload Windows package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-windows-x86_64-pc-windows-msvc
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  package-linux:
    name: Package release (linux-x86_64)
    needs: metadata
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout release revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify revision
        shell: bash
        env:
          EXPECTED_REVISION: ${{ needs.metadata.outputs.revision }}
        run: |
          set -euo pipefail
          revision="$(git rev-parse HEAD)"
          test "$revision" = "$EXPECTED_REVISION"
          printf 'RELEASE_REVISION=%s\n' "$revision"

      - name: Install and verify fixed Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RELEASE_RUST_VERSION" --profile minimal --target x86_64-unknown-linux-gnu
          info="$(rustc +1.96.1 -Vv)"
          printf '%s\n' "$info"
          grep -Fx "commit-hash: $RELEASE_RUST_COMMIT" <<<"$info"
          grep -Fx 'host: x86_64-unknown-linux-gnu' <<<"$info"

      - name: Build, smoke, and package Linux archive
        id: package
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          cargo +1.96.1 build --release --locked --target x86_64-unknown-linux-gnu

          binary="$GITHUB_WORKSPACE/target/x86_64-unknown-linux-gnu/release/mysteries"
          test -s "$binary"
          file "$binary" | grep -E 'ELF 64-bit.*x86-64'
          smoke_home="$RUNNER_TEMP/mysteries-smoke-home-linux"
          mkdir -p "$smoke_home"
          export HOME="$smoke_home"
          export XDG_CONFIG_HOME="$smoke_home/.config"
          test "$("$binary" --version)" = "mysteries $VERSION"
          "$binary" --help >/dev/null

          max_glibc="$(readelf --version-info "$binary" | grep -o 'GLIBC_[0-9.]*' | sort -Vu | tail -n 1)"
          test -n "$max_glibc"
          test "$(printf '%s\n' "$max_glibc" 'GLIBC_2.35' | sort -V | tail -n 1)" = 'GLIBC_2.35'

          stage="$RUNNER_TEMP/mysteries-package-linux"
          mkdir "$stage"
          install -m 0755 "$binary" "$stage/mysteries"
          install -m 0644 LICENSE README.md "$stage/"
          test -z "$(find "$stage" -type l -print -quit)"
          diff -u \
            <(printf '%s\n' LICENSE README.md mysteries | sort) \
            <(find "$stage" -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)

          archive_name="mysteries-v$VERSION-x86_64-unknown-linux-gnu.tar.gz"
          archive="$RUNNER_TEMP/$archive_name"
          tar --sort=name --owner=0 --group=0 --numeric-owner -C "$stage" \
            -czf "$archive" LICENSE README.md mysteries
          test -s "$archive"

          expanded="$RUNNER_TEMP/mysteries-expanded-linux"
          mkdir "$expanded"
          tar -xzf "$archive" -C "$expanded"
          diff -u \
            <(printf '%s\n' LICENSE README.md mysteries | sort) \
            <(find "$expanded" -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)
          test -x "$expanded/mysteries"
          test "$("$expanded/mysteries" --version)" = "mysteries $VERSION"
          "$expanded/mysteries" --help >/dev/null
          printf 'archive=%s\n' "$archive" >> "$GITHUB_OUTPUT"

      - name: Upload Linux package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package-linux-x86_64-unknown-linux-gnu
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 7

  assemble:
    name: Assemble release bundle
    needs:
      - metadata
      - package-windows
      - package-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Download Windows package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-windows-x86_64-pc-windows-msvc
          path: inputs/windows

      - name: Download Linux package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package-linux-x86_64-unknown-linux-gnu
          path: inputs/linux

      - name: Download release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes-${{ needs.metadata.outputs.version }}
          path: inputs/notes

      - name: Validate and seal release bundle
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          windows="mysteries-v$VERSION-x86_64-pc-windows-msvc.zip"
          linux="mysteries-v$VERSION-x86_64-unknown-linux-gnu.tar.gz"
          test -z "$(find inputs -type l -print -quit)"
          diff -u \
            <(printf '%s\n' "inputs/windows/$windows" "inputs/linux/$linux" inputs/notes/release-notes.md | sort) \
            <(find inputs -type f -print | sort)
          test -s "inputs/windows/$windows"
          test -s "inputs/linux/$linux"
          grep -q '[^[:space:]]' inputs/notes/release-notes.md

          diff -u \
            <(printf '%s\n' LICENSE README.md mysteries.exe | sort) \
            <(unzip -Z1 "inputs/windows/$windows" | sed 's#\\#/#g' | sed 's#/$##' | sort)
          diff -u \
            <(printf '%s\n' LICENSE README.md mysteries | sort) \
            <(tar -tzf "inputs/linux/$linux" | sed 's#^\./##' | sed 's#/$##' | sort)

          mkdir bundle
          cp "inputs/windows/$windows" "inputs/linux/$linux" inputs/notes/release-notes.md bundle/
          (
            cd bundle
            printf '%s\n' "$windows" "$linux" | LC_ALL=C sort | xargs sha256sum > SHA256SUMS
            test "$(wc -l < SHA256SUMS)" -eq 2
            grep -Ex '[0-9a-f]{64}  [^/ ]+' SHA256SUMS >/dev/null
            diff -u \
              <(printf '%s\n' "$windows" "$linux" | sort) \
              <(awk '{print $2}' SHA256SUMS | sort)
            sha256sum --check SHA256SUMS
          )
          test -z "$(find bundle -mindepth 1 ! -type f -print -quit)"
          diff -u \
            <(printf '%s\n' "$windows" "$linux" SHA256SUMS release-notes.md | sort) \
            <(find bundle -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)

      - name: Upload sealed release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle-${{ needs.metadata.outputs.version }}
          path: bundle/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs:
      - metadata
      - assemble
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.metadata.outputs.publish == 'true' && github.run_attempt == 1 }}
    runs-on: ubuntu-22.04
    environment:
      name: release
    permissions:
      contents: write
      actions: read
    concurrency:
      group: release-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      REVISION: ${{ needs.metadata.outputs.revision }}
      TAG: ${{ github.ref_name }}
      WINDOWS_ASSET: mysteries-v${{ needs.metadata.outputs.version }}-x86_64-pc-windows-msvc.zip
      LINUX_ASSET: mysteries-v${{ needs.metadata.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
    steps:
      - name: Download sealed release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-bundle-${{ needs.metadata.outputs.version }}
          path: bundle

      - name: Validate sealed bundle locally
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(find bundle -mindepth 1 ! -type f -print -quit)"
          diff -u \
            <(printf '%s\n' "$WINDOWS_ASSET" "$LINUX_ASSET" SHA256SUMS release-notes.md | sort) \
            <(find bundle -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)
          grep -q '[^[:space:]]' bundle/release-notes.md
          (
            cd bundle
            test "$(wc -l < SHA256SUMS)" -eq 2
            grep -Ex '[0-9a-f]{64}  [^/ ]+' SHA256SUMS >/dev/null
            diff -u \
              <(printf '%s\n' "$WINDOWS_ASSET" "$LINUX_ASSET" | sort) \
              <(awk '{print $2}' SHA256SUMS | sort)
            sha256sum --check SHA256SUMS
          )

      - name: Revalidate remote annotated tag anonymously
        shell: bash
        run: |
          set -euo pipefail
          test -z "${GH_TOKEN:-}"
          test -z "${GITHUB_TOKEN:-}"
          [[ "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          test "$TAG" = "v$VERSION"
          test "$GITHUB_REF" = "refs/tags/$TAG"
          test "$GITHUB_SHA" = "$REVISION"
          remote="https://github.com/$GITHUB_REPOSITORY.git"

          tag_output="$(git ls-remote --tags "$remote")"
          direct_ref="refs/tags/$TAG"
          peeled_ref="$direct_ref^{}"
          mapfile -t direct_refs < <(awk -v ref="$direct_ref" '$2 == ref' <<<"$tag_output")
          mapfile -t peeled_refs < <(awk -v ref="$peeled_ref" '$2 == ref' <<<"$tag_output")
          test "${#direct_refs[@]}" -eq 1
          test "${#peeled_refs[@]}" -eq 1
          tag_object="$(awk '{print $1}' <<<"${direct_refs[0]}")"
          peeled="$(awk '{print $1}' <<<"${peeled_refs[0]}")"
          test "$tag_object" != "$peeled"
          test "$peeled" = "$REVISION"
          test "$peeled" = "$GITHUB_SHA"

      - name: Revalidate candidate ancestry against stable master
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stable=false
          for attempt in 1 2 3; do
            master_before="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/master" --jq .object.sha)"
            [[ "$master_before" =~ ^[0-9a-f]{40}$ ]]
            gh api "repos/$GITHUB_REPOSITORY/compare/$REVISION...$master_before" \
              > "$RUNNER_TEMP/master-compare.json"
            master_after="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/master" --jq .object.sha)"
            [[ "$master_after" =~ ^[0-9a-f]{40}$ ]]
            if test "$master_before" = "$master_after"; then
              jq -e --arg revision "$REVISION" '
                .base_commit.sha == $revision and
                .merge_base_commit.sha == $revision and
                (.status == "ahead" or .status == "identical") and
                .behind_by == 0
              ' "$RUNNER_TEMP/master-compare.json" >/dev/null
              printf 'stable master=%s compare=%s...%s attempt=%s\n' \
                "$master_before" "$REVISION" "$master_before" "$attempt"
              stable=true
              break
            fi
            printf 'master changed during ancestry check: %s -> %s\n' \
              "$master_before" "$master_after" >&2
          done
          test "$stable" = true

      - name: Verify approvals, historical Actions evidence, and release protections
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export LC_ALL=C
          test "$GITHUB_RUN_ATTEMPT" = 1

          environment_file="$RUNNER_TEMP/environment.json"
          gh api "repos/$GITHUB_REPOSITORY/environments/release" > "$environment_file"
          environment_id="$(jq -er '
            select(.name == "release") |
            .id |
            select(type == "number")
          ' "$environment_file")"
          jq -e '
            [.protection_rules[]? | select(.type == "required_reviewers")] as $rules |
            .deployment_branch_policy.protected_branches == false and
            .deployment_branch_policy.custom_branch_policies == true and
            ($rules | length) == 1 and
            $rules[0].prevent_self_review == false and
            (
              $rules[0].reviewers |
              map({type, login: .reviewer.login}) |
              sort_by(.login)
            ) == [{"type":"User","login":"tajiaoyezi"}]
          ' "$environment_file" >/dev/null

          approvals_file="$RUNNER_TEMP/approvals.json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/approvals" \
            > "$approvals_file"
          jq -e \
            --argjson environment_id "$environment_id" \
            --arg environment_name release '
              [
                .[] |
                select(any(.environments[]?;
                  .id == $environment_id and
                  .name == $environment_name
                ))
              ] as $reviews |
              ($reviews | length) > 0 and
              all($reviews[]; .state == "approved") and
              any($reviews[];
                .state == "approved" and
                .user.login == "tajiaoyezi"
              )
            ' "$approvals_file" >/dev/null

          policy_pages="$RUNNER_TEMP/deployment-policy-pages.json"
          gh api --paginate \
            "repos/$GITHUB_REPOSITORY/environments/release/deployment-branch-policies?per_page=100" \
            > "$policy_pages"
          jq -se --arg tag "$TAG" '
            [.[].branch_policies[]] as $policies |
            ($policies | length) == 1 and
            $policies[0].name == $tag
          ' "$policy_pages" >/dev/null

          tag_run_file="$RUNNER_TEMP/tag-run.json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" > "$tag_run_file"
          tag_created_at="$(jq -er \
            --argjson run_id "$GITHUB_RUN_ID" \
            --arg revision "$REVISION" \
            --arg tag "$TAG" '
              select(
                .id == $run_id and
                .run_attempt == 1 and
                .event == "push" and
                .head_sha == $revision and
                .head_branch == $tag
              ) |
              .created_at |
              select(
                type == "string" and
                test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$")
              )
            ' "$tag_run_file")"
          printf 'tag run created_at=%s\n' "$tag_created_at"

          select_evidence() {
            local workflow_file="$1"
            local event="$2"
            local branch="$3"
            local label="$4"
            local expected="$5"
            local evidence_dir="$RUNNER_TEMP/evidence-$label"
            mkdir -p "$evidence_dir"

            gh api "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow_file" \
              > "$evidence_dir/workflow.json"
            local workflow_id
            workflow_id="$(jq -er --arg path ".github/workflows/$workflow_file" '
              select(.path == $path and .state == "active") |
              .id |
              select(type == "number")
            ' "$evidence_dir/workflow.json")"

            gh api --method GET --paginate \
              "repos/$GITHUB_REPOSITORY/actions/workflows/$workflow_id/runs" \
              -f event="$event" \
              -f branch="$branch" \
              -f head_sha="$REVISION" \
              -f per_page=100 \
              > "$evidence_dir/run-pages.json"
            jq -se '
              length > 0 and
              all(.[];
                (.total_count | type == "number") and
                .total_count <= 1000
              )
            ' "$evidence_dir/run-pages.json" >/dev/null
            jq -s \
              --argjson workflow_id "$workflow_id" \
              --arg event "$event" \
              --arg branch "$branch" \
              --arg revision "$REVISION" '
                [
                  .[].workflow_runs[] |
                  select(
                    .workflow_id == $workflow_id and
                    .event == $event and
                    .head_branch == $branch and
                    .head_sha == $revision
                  )
                ]
              ' "$evidence_dir/run-pages.json" > "$evidence_dir/runs.json"

            : > "$evidence_dir/candidates.tsv"
            while IFS= read -r encoded_run; do
              local run run_id run_attempt
              run="$(printf '%s' "$encoded_run" | base64 --decode)"
              run_id="$(jq -er '.id | select(type == "number")' <<<"$run")"
              run_attempt="$(jq -er '
                .run_attempt |
                select(type == "number" and . >= 1 and floor == .)
              ' <<<"$run")"

              local attempt
              for ((attempt = 1; attempt <= run_attempt; attempt++)); do
                if ! gh api --paginate \
                  "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/attempts/$attempt/jobs?per_page=100" \
                  > "$evidence_dir/jobs-$run_id-$attempt.pages.json"; then
                  continue
                fi
                jq -s '[.[].jobs[]]' \
                  "$evidence_dir/jobs-$run_id-$attempt.pages.json" \
                  > "$evidence_dir/jobs-$run_id-$attempt.json"
                if ! jq -e \
                  --argjson expected "$expected" \
                  --argjson run_id "$run_id" \
                  --arg revision "$REVISION" \
                  --arg cutoff "$tag_created_at" '
                    all(.[];
                      .run_id == $run_id and
                      .head_sha == $revision and
                      .status == "completed" and
                      (
                        .completed_at |
                        type == "string" and
                        test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$") and
                        . < $cutoff
                      )
                    ) and
                    (
                      (map({name, conclusion}) | sort_by(.name)) ==
                      ($expected | sort_by(.name))
                    )
                  ' "$evidence_dir/jobs-$run_id-$attempt.json" >/dev/null; then
                  continue
                fi
                local completed_at
                completed_at="$(jq -er 'map(.completed_at) | max' \
                  "$evidence_dir/jobs-$run_id-$attempt.json")"
                printf '%s\t%s\t%s\n' \
                  "$completed_at" "$run_id" "$attempt" \
                  >> "$evidence_dir/candidates.tsv"
              done
            done < <(jq -r '.[] | @base64' "$evidence_dir/runs.json")

            test -s "$evidence_dir/candidates.tsv"
            local picked completed_at run_id run_attempt
            picked="$(sort -t $'\t' -k1,1r -k2,2nr -k3,3nr \
              "$evidence_dir/candidates.tsv" | head -n 1)"
            IFS=$'\t' read -r completed_at run_id run_attempt <<<"$picked"
            printf 'selected %s run_id=%s run_attempt=%s max_completed_at=%s\n' \
              "$label" "$run_id" "$run_attempt" "$completed_at"
            printf '| %s | %s | %s | %s |\n' \
              "$label" "$run_id" "$run_attempt" "$completed_at" \
              >> "$GITHUB_STEP_SUMMARY"
          }

          ci_expected='[
            {"name":"fmt · clippy · test · build (ubuntu-latest)","conclusion":"success"},
            {"name":"fmt · clippy · test · build (windows-latest)","conclusion":"success"}
          ]'
          security_expected='[
            {"name":"RustSec dependency audit","conclusion":"success"}
          ]'
          dry_run_expected='[
            {"name":"Validate release metadata","conclusion":"success"},
            {"name":"Package release (linux-x86_64)","conclusion":"success"},
            {"name":"Package release (windows-x86_64)","conclusion":"success"},
            {"name":"Assemble release bundle","conclusion":"success"},
            {"name":"Publish GitHub Release","conclusion":"skipped"},
            {"name":"Verify published release (windows-x86_64)","conclusion":"skipped"},
            {"name":"Verify published release (linux-x86_64)","conclusion":"skipped"}
          ]'
          {
            printf '| evidence | run_id | run_attempt | max(job.completed_at) |\n'
            printf '| --- | ---: | ---: | --- |\n'
          } >> "$GITHUB_STEP_SUMMARY"
          select_evidence ci.yml push master ci "$ci_expected"
          select_evidence security-audit.yml push master security "$security_expected"
          select_evidence release.yml workflow_dispatch master dry-run "$dry_run_expected"

          ruleset_pages="$RUNNER_TEMP/ruleset-pages.json"
          gh api --method GET --paginate \
            "repos/$GITHUB_REPOSITORY/rulesets" \
            -f includes_parents=false \
            -f per_page=100 \
            > "$ruleset_pages"
          jq -s 'add' "$ruleset_pages" > "$RUNNER_TEMP/rulesets.json"

          fetch_ruleset() {
            local name="$1"
            local output="$2"
            local ruleset_id
            ruleset_id="$(jq -er --arg name "$name" '
              [.[] | select(.name == $name)] |
              if length == 1
              then .[0].id | select(type == "number")
              else error("ruleset name must be unique")
              end
            ' "$RUNNER_TEMP/rulesets.json")"
            gh api "repos/$GITHUB_REPOSITORY/rulesets/$ruleset_id" > "$output"
          }
          fetch_ruleset protect-master "$RUNNER_TEMP/protect-master.json"
          fetch_ruleset protect-stable-tags "$RUNNER_TEMP/protect-stable-tags.json"

          jq -e --arg repository "$GITHUB_REPOSITORY" '
            def only_keys($allowed):
              ((keys_unsorted - $allowed) | length) == 0;
            def bypass_is_safe_if_visible:
              (has("bypass_actors") | not) or
              (
                (.bypass_actors | type) == "array" and
                (.bypass_actors | length) == 0
              );
            def has_no_parameters:
              (has("parameters") | not) or
              (
                (.parameters | type) == "object" and
                (.parameters | length) == 0
              );

            . as $root |
            ($root.rules[] | select(.type == "pull_request") | .parameters) as $pull |
            ($root.rules[] | select(.type == "required_status_checks") | .parameters) as $checks |

            $root.name == "protect-master" and
            $root.source_type == "Repository" and
            $root.source == $repository and
            $root.target == "branch" and
            $root.enforcement == "active" and
            (($root.conditions | type) == "object") and
            (($root.conditions | keys_unsorted | sort) == ["ref_name"]) and
            (($root.conditions.ref_name | type) == "object") and
            (($root.conditions.ref_name | keys_unsorted | sort) == ["exclude","include"]) and
            (($root.conditions.ref_name.include | type) == "array") and
            (($root.conditions.ref_name.include | sort) == ["refs/heads/master"]) and
            (($root.conditions.ref_name.exclude | type) == "array") and
            (($root.conditions.ref_name.exclude | sort) == []) and
            ($root | bypass_is_safe_if_visible) and
            (($root.rules | type) == "array") and
            (([$root.rules[].type] | sort) ==
              ["deletion","non_fast_forward","pull_request","required_status_checks"]) and
            all($root.rules[];
              only_keys(["type","parameters"])
            ) and

            (($pull | type) == "object") and
            ($pull | only_keys([
              "allowed_merge_methods",
              "dismiss_stale_reviews_on_push",
              "require_code_owner_review",
              "require_last_push_approval",
              "required_approving_review_count",
              "required_review_thread_resolution",
              "dismissal_restriction",
              "required_reviewers"
            ])) and
            (($pull.allowed_merge_methods | type) == "array") and
            (($pull.allowed_merge_methods | sort) == ["merge","rebase","squash"]) and
            $pull.dismiss_stale_reviews_on_push == false and
            $pull.require_code_owner_review == false and
            $pull.require_last_push_approval == false and
            $pull.required_approving_review_count == 0 and
            $pull.required_review_thread_resolution == false and
            (
              ($pull | has("dismissal_restriction") | not) or
              (
                (($pull.dismissal_restriction | type) == "object") and
                $pull.dismissal_restriction.enabled == false and
                (($pull.dismissal_restriction.allowed_actors | type) == "array") and
                ($pull.dismissal_restriction.allowed_actors | sort) == [] and
                (($pull.dismissal_restriction | keys_unsorted | sort) ==
                  ["allowed_actors","enabled"])
              )
            ) and
            (
              ($pull | has("required_reviewers") | not) or
              (
                (($pull.required_reviewers | type) == "array") and
                $pull.required_reviewers == []
              )
            ) and

            (($checks | type) == "object") and
            ($checks | only_keys([
              "required_status_checks",
              "strict_required_status_checks_policy",
              "do_not_enforce_on_create"
            ])) and
            $checks.strict_required_status_checks_policy == true and
            (
              ($checks | has("do_not_enforce_on_create") | not) or
              (
                (($checks.do_not_enforce_on_create | type) == "boolean") and
                $checks.do_not_enforce_on_create == false
              )
            ) and
            (($checks.required_status_checks | type) == "array") and
            all($checks.required_status_checks[];
              ((type == "object") and
              ((keys_unsorted | sort) == ["context","integration_id"]) and
              ((.context | type) == "string") and
              ((.integration_id | type) == "number"))
            ) and
            (
              $checks.required_status_checks |
              map({context, integration_id}) |
              sort_by(.context)
            ) == [
              {"context":"RustSec dependency audit","integration_id":15368},
              {"context":"fmt · clippy · test · build (ubuntu-latest)","integration_id":15368},
              {"context":"fmt · clippy · test · build (windows-latest)","integration_id":15368}
            ] and
            all($root.rules[] | select(.type == "deletion" or .type == "non_fast_forward");
              has_no_parameters
            )
          ' "$RUNNER_TEMP/protect-master.json" >/dev/null

          jq -e --arg repository "$GITHUB_REPOSITORY" '
            def only_keys($allowed):
              ((keys_unsorted - $allowed) | length) == 0;
            def bypass_is_safe_if_visible:
              (has("bypass_actors") | not) or
              (
                (.bypass_actors | type) == "array" and
                (.bypass_actors | length) == 0
              );
            def has_no_parameters:
              (has("parameters") | not) or
              (
                (.parameters | type) == "object" and
                (.parameters | length) == 0
              );

            . as $root |
            ($root.rules[] | select(.type == "update")) as $update |

            $root.name == "protect-stable-tags" and
            $root.source_type == "Repository" and
            $root.source == $repository and
            $root.target == "tag" and
            $root.enforcement == "active" and
            (($root.conditions | type) == "object") and
            (($root.conditions | keys_unsorted | sort) == ["ref_name"]) and
            (($root.conditions.ref_name | type) == "object") and
            (($root.conditions.ref_name | keys_unsorted | sort) == ["exclude","include"]) and
            (($root.conditions.ref_name.include | type) == "array") and
            (($root.conditions.ref_name.include | sort) == ["refs/tags/v*"]) and
            (($root.conditions.ref_name.exclude | type) == "array") and
            (($root.conditions.ref_name.exclude | sort) == []) and
            ($root | bypass_is_safe_if_visible) and
            (($root.rules | type) == "array") and
            (([$root.rules[].type] | sort) == ["deletion","update"]) and
            all($root.rules[];
              only_keys(["type","parameters"])
            ) and
            all($root.rules[] | select(.type == "deletion");
              has_no_parameters
            ) and
            (
              ($update | has("parameters") | not) or
              (
                (($update.parameters | type) == "object") and
                (
                  (($update.parameters | length) == 0) or
                  (
                    (($update.parameters | keys_unsorted) ==
                      ["update_allows_fetch_and_merge"]) and
                    (($update.parameters.update_allows_fetch_and_merge | type) ==
                      "boolean") and
                    $update.parameters.update_allows_fetch_and_merge == false
                  )
                )
              )
            )
          ' "$RUNNER_TEMP/protect-stable-tags.json" >/dev/null

      - name: Show GitHub CLI version
        shell: bash
        run: gh --version

      - name: Preflight existing Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          matches="$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq ".[] | select(.tag_name == \"$TAG\") | .id")"
          test -z "$matches"

      - name: Create draft Release
        id: draft_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          request="$RUNNER_TEMP/create-release-request.json"
          response="$RUNNER_TEMP/create-release.json"
          jq -n \
            --arg tag "$TAG" \
            --arg name "mysteries $TAG" \
            --rawfile body bundle/release-notes.md '
              {
                tag_name: $tag,
                name: $name,
                body: $body,
                draft: true,
                prerelease: false,
                generate_release_notes: false
              }
            ' > "$request"
          status="$(
            curl --silent --show-error \
              --output "$response" \
              --write-out '%{http_code}' \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "User-Agent: mysteries-release-workflow" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --header "Content-Type: application/json" \
              --data-binary "@$request" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases"
          )"
          test "$status" = "201"

          release_id="$(jq -er '
            .id |
            select(type == "number" and . > 0 and floor == .)
          ' "$response")"
          api_url="https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$release_id"
          upload_url="https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$release_id/assets{?name,label}"
          jq -e \
            --argjson id "$release_id" \
            --arg tag "$TAG" \
            --arg name "mysteries $TAG" \
            --arg api_url "$api_url" \
            --arg upload_url "$upload_url" '
              type == "object" and
              .id == $id and
              .tag_name == $tag and
              .name == $name and
              .draft == true and
              .prerelease == false and
              (.target_commitish | type == "string" and length > 0) and
              (.assets | type == "array" and length == 0) and
              .url == $api_url and
              .upload_url == $upload_url
            ' "$response" >/dev/null
          jq -e -r -j '
            if (.body | type) == "string"
            then .body
            else error("created draft body must be a string")
            end
          ' "$response" > "$RUNNER_TEMP/create-release-body"
          cmp -s bundle/release-notes.md "$RUNNER_TEMP/create-release-body"

          printf 'release_id=%s\n' "$release_id" >> "$GITHUB_OUTPUT"
          printf 'api_url=%s\n' "$api_url" >> "$GITHUB_OUTPUT"
          printf 'upload_url=%s\n' "$upload_url" >> "$GITHUB_OUTPUT"

      - name: Upload draft assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft_release.outputs.release_id }}
          UPLOAD_URL: ${{ steps.draft_release.outputs.upload_url }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]]
          expected_upload_url="https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets{?name,label}"
          test "$UPLOAD_URL" = "$expected_upload_url"
          upload_base="${UPLOAD_URL::-13}"
          test "$upload_base" != "$UPLOAD_URL"

          responses="$RUNNER_TEMP/upload-responses"
          mkdir "$responses"
          : > "$RUNNER_TEMP/uploaded-assets.ndjson"
          for asset in "$WINDOWS_ASSET" "$LINUX_ASSET" SHA256SUMS; do
            file="bundle/$asset"
            test -f "$file"
            test -s "$file"
            size="$(stat --printf='%s' "$file")"
            digest="sha256:$(sha256sum "$file" | awk '{print $1}')"
            response="$responses/$asset.json"
            status="$(
              curl --silent --show-error \
                --output "$response" \
                --write-out '%{http_code}' \
                --request POST \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "User-Agent: mysteries-release-workflow" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                --header "Content-Type: application/octet-stream" \
                --data-binary "@$file" \
                "$upload_base?name=$asset"
            )"
            test "$status" = "201"
            jq -e \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg name "$asset" \
              --argjson size "$size" \
              --arg digest "$digest" '
                type == "object" and
                (.id | type == "number" and . > 0 and floor == .) and
                .name == $name and
                .state == "uploaded" and
                .size == $size and
                .url == (
                  "https://api.github.com/repos/" + $repository +
                  "/releases/assets/" + (.id | tostring)
                ) and
                (
                  (has("digest") | not) or
                  .digest == null or
                  .digest == $digest
                )
              ' "$response" >/dev/null
            jq -c '
              {
                id,
                name,
                state,
                size,
                url,
                digest: (.digest // null)
              }
            ' "$response" >> "$RUNNER_TEMP/uploaded-assets.ndjson"
          done

          jq -s \
            --arg windows "$WINDOWS_ASSET" \
            --arg linux "$LINUX_ASSET" '
              select(length == 3) |
              select((map(.id) | unique | length) == 3) |
              select(
                (map(.name) | sort) ==
                ([$windows, $linux, "SHA256SUMS"] | sort)
              )
            ' "$RUNNER_TEMP/uploaded-assets.ndjson" \
            > "$RUNNER_TEMP/uploaded-assets.json"
          test -s "$RUNNER_TEMP/uploaded-assets.json"

      - name: Fetch draft Release metadata through API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft_release.outputs.release_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]]
          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" > draft.json

      - name: Verify draft Release metadata and body identity locally
        shell: bash
        env:
          RELEASE_ID: ${{ steps.draft_release.outputs.release_id }}
        run: |
          set -euo pipefail
          test -z "${GH_TOKEN:-}"
          test -z "${GITHUB_TOKEN:-}"
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]]
          jq -e --arg tag "$TAG" --argjson id "$RELEASE_ID" '
            .id == $id and .tag_name == $tag and
            .draft == true and .prerelease == false and
            (.target_commitish | type == "string" and length > 0) and
            ([.assets[] | select(.size <= 0)] | length == 0)
          ' draft.json >/dev/null
          jq -S '
            [
              .assets[] |
              {
                id,
                name,
                state,
                size,
                url,
                digest: (.digest // null)
              }
            ] |
            sort_by(.name)
          ' draft.json > "$RUNNER_TEMP/draft-assets.json"
          jq -S 'sort_by(.name)' "$RUNNER_TEMP/uploaded-assets.json" \
            > "$RUNNER_TEMP/upload-response-assets.json"
          cmp -s \
            "$RUNNER_TEMP/upload-response-assets.json" \
            "$RUNNER_TEMP/draft-assets.json"
          diff -u \
            <(printf '%s\n' "$WINDOWS_ASSET" "$LINUX_ASSET" SHA256SUMS | sort) \
            <(jq -r '.assets[].name' draft.json | sort)
          jq -e -r -j '
            if (.body | type) == "string"
            then .body
            else error("draft body must be a string")
            end
          ' draft.json > "$RUNNER_TEMP/draft-body"
          cmp -s bundle/release-notes.md "$RUNNER_TEMP/draft-body"

      - name: Download draft assets through API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft_release.outputs.release_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]]
          mkdir draft-download
          asset_count=0
          while IFS=$'\t' read -r asset_id asset_name; do
            [[ "$asset_id" =~ ^[0-9]+$ ]]
            case "$asset_name" in
              "$WINDOWS_ASSET"|"$LINUX_ASSET"|SHA256SUMS) ;;
              *) exit 1 ;;
            esac
            gh api \
              -H "Accept: application/octet-stream" \
              "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
              > "draft-download/$asset_name"
            test -s "draft-download/$asset_name"
            asset_count=$((asset_count + 1))
          done < <(jq -r '.assets[] | [.id, .name] | @tsv' draft.json)
          test "$asset_count" -eq 3

      - name: Verify downloaded draft assets locally
        shell: bash
        run: |
          set -euo pipefail
          test -z "${GH_TOKEN:-}"
          test -z "${GITHUB_TOKEN:-}"
          diff -u \
            <(printf '%s\n' "$WINDOWS_ASSET" "$LINUX_ASSET" SHA256SUMS | sort) \
            <(find draft-download -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)
          for asset in "$WINDOWS_ASSET" "$LINUX_ASSET" SHA256SUMS; do
            cmp -s "bundle/$asset" "draft-download/$asset"
            digest="$(jq -r --arg asset "$asset" '
              .assets[] |
              select(.name == $asset) |
              .digest // empty
            ' draft.json)"
            if test -n "$digest"; then
              [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
              local_digest="$(sha256sum "bundle/$asset" | awk '{print $1}')"
              test "$digest" = "sha256:$local_digest"
            fi
          done
          (cd draft-download && sha256sum --check ../bundle/SHA256SUMS)

      - name: Revalidate remote tag immediately before publishing
        shell: bash
        run: |
          set -euo pipefail
          test -z "${GH_TOKEN:-}"
          test -z "${GITHUB_TOKEN:-}"
          remote="https://github.com/$GITHUB_REPOSITORY.git"
          tag_output="$(git ls-remote --tags "$remote")"
          direct_ref="refs/tags/$TAG"
          peeled_ref="$direct_ref^{}"
          mapfile -t direct_refs < <(awk -v ref="$direct_ref" '$2 == ref' <<<"$tag_output")
          mapfile -t peeled_refs < <(awk -v ref="$peeled_ref" '$2 == ref' <<<"$tag_output")
          test "${#direct_refs[@]}" -eq 1
          test "${#peeled_refs[@]}" -eq 1
          tag_object="$(awk '{print $1}' <<<"${direct_refs[0]}")"
          peeled="$(awk '{print $1}' <<<"${peeled_refs[0]}")"
          test "$tag_object" != "$peeled"
          test "$peeled" = "$REVISION"
          test "$peeled" = "$GITHUB_SHA"

      - name: Publish verified Release as latest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft_release.outputs.release_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]]
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false -f make_latest=true > published.json

      - name: Fetch public Release metadata through API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft_release.outputs.release_id }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" > public.json
          gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .tag_name \
            > "$RUNNER_TEMP/latest-release-tag"

      - name: Verify public Release metadata and body identity locally
        shell: bash
        env:
          RELEASE_ID: ${{ steps.draft_release.outputs.release_id }}
        run: |
          set -euo pipefail
          test -z "${GH_TOKEN:-}"
          test -z "${GITHUB_TOKEN:-}"
          [[ "$RELEASE_ID" =~ ^[0-9]+$ ]]
          jq -e --arg tag "$TAG" --argjson id "$RELEASE_ID" '
            .id == $id and .tag_name == $tag and
            .draft == false and .prerelease == false and
            .immutable == true and
            (.target_commitish | type == "string" and length > 0) and
            ([.assets[] | select(.size <= 0)] | length == 0)
          ' public.json >/dev/null
          test "$(cat "$RUNNER_TEMP/latest-release-tag")" = "$TAG"
          diff -u \
            <(printf '%s\n' "$WINDOWS_ASSET" "$LINUX_ASSET" SHA256SUMS | sort) \
            <(jq -r '.assets[].name' public.json | sort)
          jq -e -r -j '
            if (.body | type) == "string"
            then .body
            else error("public body must be a string")
            end
          ' public.json > "$RUNNER_TEMP/public-body"
          cmp -s bundle/release-notes.md "$RUNNER_TEMP/public-body"

  verify-public-windows:
    name: Verify published release (windows-x86_64)
    needs:
      - metadata
      - publish
    if: ${{ needs.metadata.outputs.publish == 'true' && needs.publish.result == 'success' }}
    runs-on: windows-2022
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download and verify public Windows asset anonymously
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path Env:GH_TOKEN) { throw 'public verify不应存在GH_TOKEN' }
          if (Test-Path Env:GITHUB_TOKEN) { throw 'public verify不应存在GITHUB_TOKEN' }
          $Asset = "mysteries-v$env:VERSION-x86_64-pc-windows-msvc.zip"
          $Base = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:TAG"
          Invoke-WebRequest "$Base/$Asset" -OutFile $Asset
          Invoke-WebRequest "$Base/SHA256SUMS" -OutFile SHA256SUMS
          $Lines = @(Get-Content -LiteralPath SHA256SUMS | Where-Object { $_ -match "  $([regex]::Escape($Asset))$" })
          if ($Lines.Count -ne 1) { throw 'Windows public checksum记录缺失或重复' }
          $ExpectedHash = ($Lines[0] -split '\s+')[0].ToLowerInvariant()
          $ActualHash = (Get-FileHash -LiteralPath $Asset -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($ActualHash -ne $ExpectedHash) { throw 'Windows public checksum不匹配' }
          Expand-Archive -LiteralPath $Asset -DestinationPath expanded
          $Expected = @('LICENSE','README.md','mysteries.exe') | Sort-Object
          $Actual = @(Get-ChildItem -LiteralPath expanded -File | Select-Object -ExpandProperty Name | Sort-Object)
          if (Compare-Object $Expected $Actual) { throw 'Windows public archive文件集异常' }
          $Binary = Join-Path (Resolve-Path expanded) 'mysteries.exe'
          if ((& $Binary --version | Out-String).Trim() -ne "mysteries $env:VERSION") { throw 'Windows public --version异常' }
          if ($LASTEXITCODE -ne 0) { throw 'Windows public --version失败' }
          & $Binary --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw 'Windows public --help失败' }

  verify-public-linux:
    name: Verify published release (linux-x86_64)
    needs:
      - metadata
      - publish
    if: ${{ needs.metadata.outputs.publish == 'true' && needs.publish.result == 'success' }}
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download and verify public Linux asset anonymously
        shell: bash
        run: |
          set -euo pipefail
          test -z "${GH_TOKEN:-}"
          test -z "${GITHUB_TOKEN:-}"
          asset="mysteries-v$VERSION-x86_64-unknown-linux-gnu.tar.gz"
          base="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
          curl -fL --retry 3 -o "$asset" "$base/$asset"
          curl -fL --retry 3 -o SHA256SUMS "$base/SHA256SUMS"
          test "$(grep -Ec "^[0-9a-f]{64}  $asset$" SHA256SUMS)" -eq 1
          grep "  $asset$" SHA256SUMS | sha256sum --check
          mkdir expanded
          tar -xzf "$asset" -C expanded
          diff -u \
            <(printf '%s\n' LICENSE README.md mysteries | sort) \
            <(find expanded -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)
          test -x expanded/mysteries
          file expanded/mysteries | grep -E 'ELF 64-bit.*x86-64'
          max_glibc="$(readelf --version-info expanded/mysteries | grep -o 'GLIBC_[0-9.]*' | sort -Vu | tail -n 1)"
          test -n "$max_glibc"
          test "$(printf '%s\n' "$max_glibc" 'GLIBC_2.35' | sort -V | tail -n 1)" = 'GLIBC_2.35'
          test "$(expanded/mysteries --version)" = "mysteries $VERSION"
          expanded/mysteries --help >/dev/null
