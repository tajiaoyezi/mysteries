name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test · build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      # rustup 依据仓库根的 rust-toolchain.toml 自动装 stable + rustfmt + clippy
      - name: Show toolchain
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      # 注意:跑全量 cargo test(含 tests/ 集成测试),不是 --lib
      - name: Test (full suite, incl. integration)
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked
