[package]
name = "mysteries"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
globset = "0.4"
ignore = "0.4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "time"] }

[dev-dependencies]
tempfile = "3"
